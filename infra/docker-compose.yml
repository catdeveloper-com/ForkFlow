name: forkflow

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${FORKFLOW_POSTGRES_DB}
      POSTGRES_USER: ${FORKFLOW_POSTGRES_USER}
      POSTGRES_PASSWORD: ${FORKFLOW_POSTGRES_PASSWORD}
    ports:
      - "${FORKFLOW_POSTGRES_PORT}:5432"
    volumes:
      - forkflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "${FORKFLOW_REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  pgadmin:
    image: dpage/pgadmin4:9.16
    environment:
      PGADMIN_DEFAULT_EMAIL: ${FORKFLOW_PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${FORKFLOW_PGADMIN_PASSWORD}
    ports:
      - "${FORKFLOW_PGADMIN_PORT}:80"
    volumes:
      - forkflow_pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  forkflow_postgres_data:
  forkflow_pgadmin_data:
